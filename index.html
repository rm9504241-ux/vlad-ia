<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLAD IA — Artificial Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.js" crossorigin="anonymous"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0A0A0B;
    --surface: #111113;
    --surface2: #1a1a1d;
    --border: #1e1e22;
    --border2: #2a2a30;
    --text: #f0f0f0;
    --text-dim: #888;
    --text-muted: #444;
    --white: #ffffff;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

  .app { display: flex; height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
    transition: transform 0.3s;
  }
  .sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 36px; height: 36px; background: var(--white); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 13px;
    color: #000; letter-spacing: -0.5px; flex-shrink: 0;
  }
  .logo-text { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 17px; color: var(--white); }
  .logo-sub { font-size: 10px; color: var(--text-muted); font-weight: 400; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

  .new-chat-btn {
    margin: 14px 16px; padding: 9px 14px; background: transparent;
    border: 1px solid var(--border2); border-radius: 8px; color: var(--text-dim);
    font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer;
    display: flex; align-items: center; gap: 8px; transition: all 0.2s; width: calc(100% - 32px);
  }
  .new-chat-btn:hover { background: var(--surface2); color: var(--text); }

  .chat-history { flex: 1; overflow-y: auto; padding: 8px; }
  .history-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; padding: 8px 10px 6px; }
  .history-item { padding: 9px 12px; border-radius: 7px; font-size: 13px; color: var(--text-dim); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: all 0.15s; }
  .history-item:hover, .history-item.active { background: var(--surface2); color: var(--text); }

  .sidebar-footer { padding: 14px 16px; border-top: 1px solid var(--border); }
  .model-badge { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--surface2); border-radius: 7px; font-size: 12px; color: var(--text-dim); }
  .status-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; flex-shrink: 0; animation: pulse-dot 2s infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Main ── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; overflow: hidden; }

  /* Topbar */
  .topbar { height: 56px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0; position: relative; z-index: 10; background: rgba(10,10,11,0.8); backdrop-filter: blur(12px); }
  .menu-btn { display: none; background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 4px; }
  .topbar-title { font-size: 14px; color: var(--text-dim); flex: 1; }
  .icon-btn { width: 32px; height: 32px; background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .icon-btn:hover { background: var(--surface); color: var(--text-dim); }

  /* ── Messages ── */
  .messages-area { flex: 1; overflow-y: auto; scroll-behavior: smooth; position: relative; }
  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .message-row { max-width: 700px; margin: 0 auto; padding: 0 24px; margin-bottom: 24px; display: flex; flex-direction: column; }
  .message-row:first-child { margin-top: 28px; }
  .message-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .avatar { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .avatar.ai { background: var(--white); color: #000; font-family: 'Space Grotesk', sans-serif; font-size: 9px; letter-spacing: 0.3px; }
  .avatar.user { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border2); }
  .sender-name { font-size: 12px; font-weight: 500; color: var(--text-dim); }
  .message-body { font-size: 15px; line-height: 1.75; color: rgba(255,255,255,0.85); padding-left: 36px; }
  .message-body.user-msg { color: rgba(255,255,255,0.6); }

  /* Typing */
  .typing-row { max-width: 700px; margin: 0 auto; padding: 0 24px; margin-bottom: 24px; }

  /* ── WELCOME / ANIMATED CHAT UI ── */
  .welcome {
    width: 100%; height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }

  /* Ambient blobs */
  .blob {
    position: absolute; border-radius: 50%; filter: blur(128px);
    pointer-events: none; animation: blob-pulse 4s ease-in-out infinite;
  }
  .blob-1 { width: 384px; height: 384px; background: rgba(124,58,237,0.07); top: 0; left: 25%; animation-delay: 0s; }
  .blob-2 { width: 384px; height: 384px; background: rgba(99,102,241,0.07); bottom: 0; right: 25%; animation-delay: 0.7s; }
  .blob-3 { width: 256px; height: 256px; background: rgba(217,70,239,0.06); top: 25%; right: 33%; animation-delay: 1s; filter: blur(96px); }
  @keyframes blob-pulse { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.05)} }

  /* Globe canvas */
  #globeCanvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; opacity: 0;
    animation: fadeInGlobe 2s ease forwards 0.5s;
  }
  @keyframes fadeInGlobe { to { opacity: 1; } }

  /* Content */
  .welcome-content {
    position: relative; z-index: 10; width: 100%; max-width: 640px;
    padding: 24px; display: flex; flex-direction: column; align-items: center;
    animation: fadeUp 0.6s ease forwards; opacity: 0;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  /* Title */
  .welcome-title-wrap { text-align: center; margin-bottom: 32px; }
  .welcome-title {
    font-size: clamp(24px, 3.5vw, 32px); font-weight: 500; letter-spacing: -0.5px;
    background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.35));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 10px; line-height: 1.2;
  }
  .welcome-underline {
    height: 1px; width: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    margin-bottom: 10px;
  }
  .welcome-sub { font-size: 13px; color: rgba(255,255,255,0.35); }

  /* Chat box */
  .chat-box {
    width: 100%; background: rgba(255,255,255,0.015);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 16px;
    backdrop-filter: blur(24px); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    position: relative; margin-bottom: 16px; transition: box-shadow 0.3s;
  }
  .chat-box:focus-within { box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08); }

  /* Command palette */
  .command-palette {
    position: absolute; left: 12px; right: 12px; bottom: calc(100% + 8px);
    background: rgba(5,5,7,0.97); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; z-index: 50; overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    animation: fadeInPalette 0.15s ease;
  }
  @keyframes fadeInPalette { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .command-item {
    display: flex; align-items: center; gap: 8px; padding: 9px 14px;
    font-size: 12px; cursor: pointer; transition: background 0.12s; color: rgba(255,255,255,0.65);
  }
  .command-item:hover, .command-item.active { background: rgba(255,255,255,0.08); color: #fff; }
  .command-item-prefix { color: rgba(255,255,255,0.35); margin-left: 4px; }
  .command-item-icon { width: 16px; height: 16px; opacity: 0.6; flex-shrink: 0; }

  /* Textarea */
  .chat-textarea {
    width: 100%; background: transparent; border: none; outline: none;
    padding: 18px 18px 10px; color: rgba(255,255,255,0.88); font-size: 14px;
    font-family: 'Inter', sans-serif; resize: none; min-height: 64px; max-height: 200px;
    line-height: 1.6;
  }
  .chat-textarea::placeholder { color: rgba(255,255,255,0.2); }

  /* Attachments */
  .attachments { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 10px; }
  .attachment-chip {
    display: flex; align-items: center; gap: 6px; padding: 5px 10px;
    background: rgba(255,255,255,0.04); border-radius: 8px;
    font-size: 12px; color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.08);
    animation: popIn 0.2s ease;
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
  .attachment-remove { background: none; border: none; color: rgba(255,255,255,0.35); cursor: pointer; padding: 0; line-height: 1; transition: color 0.15s; }
  .attachment-remove:hover { color: rgba(255,255,255,0.8); }

  /* Bottom bar */
  .chat-bottom {
    padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .chat-actions-left { display: flex; align-items: center; gap: 6px; }

  .action-btn {
    width: 34px; height: 34px; background: none; border: none;
    color: rgba(255,255,255,0.35); border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; position: relative;
  }
  .action-btn:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.05); }
  .action-btn.active { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.9); }

  .send-btn {
    display: flex; align-items: center; gap: 7px; padding: 8px 16px;
    border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer;
    border: none; transition: all 0.2s; font-family: 'Inter', sans-serif;
  }
  .send-btn.active { background: #fff; color: #0A0A0B; box-shadow: 0 4px 20px rgba(255,255,255,0.1); }
  .send-btn.inactive { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.35); }
  .send-btn:disabled { cursor: not-allowed; }
  .send-btn.active:hover { background: #f0f0f0; }

  /* Quick commands */
  .quick-commands { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
  .quick-btn {
    display: flex; align-items: center; gap: 7px; padding: 8px 14px;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px; font-size: 13px; color: rgba(255,255,255,0.5);
    cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
    animation: fadeUp 0.5s ease forwards; opacity: 0;
  }
  .quick-btn:nth-child(1){animation-delay:0.1s}
  .quick-btn:nth-child(2){animation-delay:0.2s}
  .quick-btn:nth-child(3){animation-delay:0.3s}
  .quick-btn:nth-child(4){animation-delay:0.4s}
  .quick-btn:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.1); transform: translateY(-1px); }

  /* Thinking bar */
  .thinking-bar {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 99px; padding: 8px 18px; display: flex; align-items: center; gap: 12px;
    backdrop-filter: blur(20px); z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  .thinking-avatar {
    width: 28px; height: 28px; border-radius: 99px; background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.85);
    font-family: 'Space Grotesk', sans-serif;
  }
  .thinking-text { font-size: 13px; color: rgba(255,255,255,0.6); display: flex; align-items: center; gap: 8px; }
  .thinking-dots { display: flex; align-items: center; gap: 3px; }
  .thinking-dot { width: 5px; height: 5px; background: rgba(255,255,255,0.8); border-radius: 50%; animation: tdot 1.2s ease-in-out infinite; }
  .thinking-dot:nth-child(1){animation-delay:0.15s}
  .thinking-dot:nth-child(2){animation-delay:0.30s}
  .thinking-dot:nth-child(3){animation-delay:0.45s}
  @keyframes tdot { 0%,100%{opacity:0.3;transform:scale(0.85)} 50%{opacity:0.9;transform:scale(1.1)} }

  /* ── Input area (chat mode) ── */
  .input-area {
    padding: 14px 20px 18px; border-top: 1px solid var(--border);
    background: rgba(10,10,11,0.85); backdrop-filter: blur(12px);
    flex-shrink: 0; position: relative; z-index: 10;
  }
  .input-wrapper { max-width: 700px; margin: 0 auto; position: relative; }
  .input-box {
    width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 13px 48px 13px 16px; color: rgba(255,255,255,0.88);
    font-size: 14px; font-family: 'Inter', sans-serif; resize: none; outline: none;
    transition: border-color 0.2s; min-height: 50px; max-height: 200px; line-height: 1.5;
  }
  .input-box::placeholder { color: rgba(255,255,255,0.2); }
  .input-box:focus { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }
  .input-send-btn {
    position: absolute; right: 10px; bottom: 10px; width: 30px; height: 30px;
    background: var(--white); border: none; border-radius: 7px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .input-send-btn:hover { background: #e8e8e8; transform: scale(1.05); }
  .input-send-btn:disabled { background: rgba(255,255,255,0.12); cursor: not-allowed; transform: none; }
  .input-hint { text-align: center; font-size: 11px; color: rgba(255,255,255,0.18); margin-top: 8px; }

  /* SVG icons */
  .icon { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .icon-sm { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  /* Loader spin */
  .spin { animation: spin 1.5s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mobile */
  @media (max-width: 640px) {
    .sidebar { display: none; position: fixed; top:0;left:0;bottom:0; z-index:100; }
    .sidebar.open { display: flex; }
    .menu-btn { display: flex; }
    .welcome-content { padding: 16px; }
    .quick-commands { gap: 6px; }
    .quick-btn { font-size: 12px; padding: 7px 11px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon" style="background:linear-gradient(135deg,#fff 0%,#ccc 100%);">
          <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;color:#000;letter-spacing:-0.5px;">VL</span>
        </div>
        <div>
          <div class="logo-text">VLAD IA</div>
          <div class="logo-sub">Artificial Intelligence</div>
        </div>
      </div>
    </div>
    <button class="new-chat-btn" onclick="newChat()">
      <svg class="icon-sm" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Chat
    </button>
    <div class="chat-history">
      <div class="history-label">Today</div>
      <div class="history-item active" id="firstHistory">Welcome to VLAD IA</div>
    </div>
    <div class="sidebar-footer">
      <div class="model-badge">
        <div class="status-dot"></div>
        <span>Claude Sonnet 4.6</span>
      </div>
      <div style="margin-top:10px;padding:6px 10px;font-size:11px;color:rgba(255,255,255,0.2);display:flex;align-items:center;gap:6px;">
        <span>Created by</span>
        <span style="color:rgba(255,255,255,0.45);font-weight:500;font-family:'Space Grotesk',sans-serif;">Vladimir Qays</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">
        <svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="topbar-title">VLAD IA</span>
      <button class="icon-btn" onclick="newChat()" title="New Chat">
        <svg class="icon-sm" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      </button>
    </div>

    <!-- Messages area -->
    <div class="messages-area" id="messagesArea">

      <!-- WELCOME SCREEN -->
      <div class="welcome" id="welcomeScreen">
        <canvas id="globeCanvas"></canvas>
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <div class="welcome-content">
          <!-- Title -->
          <div class="welcome-title-wrap">
            <div class="welcome-title">How can I help today?</div>
            <div class="welcome-underline"></div>
            <div class="welcome-sub">Type a command or ask a question</div>
          </div>

          <!-- Animated chat box -->
          <div class="chat-box" id="welcomeChatBox">
            <!-- Command palette -->
            <div class="command-palette" id="commandPalette" style="display:none"></div>

            <textarea
              class="chat-textarea"
              id="welcomeInput"
              placeholder="Ask VLAD IA a question..."
              rows="1"
              oninput="onWelcomeInput(this)"
              onkeydown="onWelcomeKey(event)"
            ></textarea>

            <div class="attachments" id="attachmentsList"></div>

            <div class="chat-bottom">
              <div class="chat-actions-left">
                <button class="action-btn" title="Attach file" onclick="attachFile()">
                  <svg class="icon" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <button class="action-btn" id="commandBtn" title="Commands" onclick="toggleCommandPalette()">
                  <!-- Command icon (⌘) -->
                  <svg class="icon" viewBox="0 0 24 24"><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>
                </button>
              </div>
              <button class="send-btn inactive" id="welcomeSendBtn" onclick="welcomeSend()" disabled>
                <svg class="icon-sm" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="currentColor" stroke="none"/></svg>
                <span>Send</span>
              </button>
            </div>
          </div>

          <!-- Quick command buttons -->
          <div class="quick-commands">
            <button class="quick-btn" onclick="quickCmd('/clone')">
              <svg class="icon-sm" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
              Clone UI
            </button>
            <button class="quick-btn" onclick="quickCmd('/figma')">
              <svg class="icon-sm" viewBox="0 0 24 24"><path d="M5 5.5A3.5 3.5 0 0 1 8.5 2H12v7H8.5A3.5 3.5 0 0 1 5 5.5z"/><path d="M12 2h3.5a3.5 3.5 0 1 1 0 7H12V2z"/><path d="M12 12.5a3.5 3.5 0 1 1 7 0 3.5 3.5 0 1 1-7 0z"/><path d="M5 19.5A3.5 3.5 0 0 1 8.5 16H12v3.5a3.5 3.5 0 1 1-7 0z"/><path d="M5 12.5A3.5 3.5 0 0 1 8.5 9H12v7H8.5A3.5 3.5 0 0 1 5 12.5z"/></svg>
              Import Figma
            </button>
            <button class="quick-btn" onclick="quickCmd('/page')">
              <svg class="icon-sm" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              Create Page
            </button>
            <button class="quick-btn" onclick="quickCmd('/improve')">
              <svg class="icon-sm" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/></svg>
              Improve
            </button>
          </div>
        </div>
      </div>
      <!-- end welcome -->

    </div>
    <!-- end messages-area -->

    <!-- Input (chat mode) -->
    <div class="input-area" id="chatInput" style="display:none">
      <div class="input-wrapper">
        <textarea class="input-box" id="chatTextarea" placeholder="Type your message here..." rows="1"
          onkeydown="handleChatKey(event)" oninput="autoResize(this)"></textarea>
        <button class="input-send-btn" id="chatSendBtn" onclick="sendMessage()">
          <svg class="icon-sm" viewBox="0 0 24 24" stroke="#000"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="#000" stroke="none"/></svg>
        </button>
      </div>
      <div class="input-hint">VLAD IA can make mistakes — verify important information</div>
    </div>
  </main>
</div>

<!-- Thinking bar -->
<div class="thinking-bar" id="thinkingBar" style="display:none">
  <div class="thinking-avatar" style="background:#000;border:1px solid #333;padding:0;overflow:hidden;">
    <img src="/mnt/user-data/uploads/1001353013.png" style="width:100%;height:100%;object-fit:cover;" alt="VL">
  </div>
  <div class="thinking-text">
    <span>Thinking</span>
    <div class="thinking-dots">
      <div class="thinking-dot"></div>
      <div class="thinking-dot"></div>
      <div class="thinking-dot"></div>
    </div>
  </div>
</div>

<script>
// ── Globe ─────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('globeCanvas');
  if (!canvas || typeof THREE === 'undefined') return;
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
  camera.position.z = 2.8;

  const geo = new THREE.SphereGeometry(1, 38, 38);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.06 });
  const globe = new THREE.Mesh(geo, mat);
  scene.add(globe);

  const dotGeo = new THREE.BufferGeometry();
  const pos = [];
  const N = 700;
  for (let i = 0; i < N; i++) {
    const phi = Math.acos(-1 + (2*i)/N);
    const theta = Math.sqrt(N * Math.PI) * phi;
    pos.push(Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));
  }
  dotGeo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  const dotMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.018, transparent: true, opacity: 0.4 });
  const dots = new THREE.Points(dotGeo, dotMat);
  scene.add(dots);

  const ringGeo = new THREE.TorusGeometry(1, 0.002, 8, 120);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  scene.add(ring);

  function resize() {
    const p = canvas.parentElement;
    if (!p) return;
    const w = p.clientWidth, h = p.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  let raf;
  function animate() {
    raf = requestAnimationFrame(animate);
    globe.rotation.y += 0.002; globe.rotation.x += 0.0006;
    dots.rotation.y += 0.002; dots.rotation.x += 0.0006;
    ring.rotation.z += 0.0008;
    renderer.render(scene, camera);
  }
  animate();
  window._stopGlobe = () => { cancelAnimationFrame(raf); };
})();

// ── Command suggestions ───────────────────────────────────
const COMMANDS = [
  { icon: '🖼', label: 'Clone UI',     desc: 'Generate a UI from a screenshot', prefix: '/clone'   },
  { icon: '🎨', label: 'Import Figma', desc: 'Import a design from Figma',       prefix: '/figma'   },
  { icon: '🖥', label: 'Create Page',  desc: 'Generate a new web page',           prefix: '/page'    },
  { icon: '✨', label: 'Improve',      desc: 'Improve existing UI design',        prefix: '/improve' },
];
let activeSuggestion = -1;
let paletteOpen = false;

function renderPalette(filter = '') {
  const el = document.getElementById('commandPalette');
  const filtered = COMMANDS.filter(c => c.prefix.startsWith(filter) || filter === '/');
  if (!filtered.length) { closePalette(); return; }
  el.innerHTML = filtered.map((c, i) => `
    <div class="command-item ${i === activeSuggestion ? 'active' : ''}" onclick="selectCommand('${c.prefix}')">
      <span>${c.icon}</span>
      <span style="font-weight:500">${c.label}</span>
      <span class="command-item-prefix">${c.prefix}</span>
    </div>`).join('');
  el.style.display = 'block';
  paletteOpen = true;
  document.getElementById('commandBtn').classList.add('active');
}

function closePalette() {
  document.getElementById('commandPalette').style.display = 'none';
  paletteOpen = false;
  activeSuggestion = -1;
  document.getElementById('commandBtn').classList.remove('active');
}

function toggleCommandPalette() {
  if (paletteOpen) { closePalette(); }
  else { renderPalette('/'); }
}

function selectCommand(prefix) {
  const inp = document.getElementById('welcomeInput');
  inp.value = prefix + ' ';
  inp.focus();
  closePalette();
  updateSendBtn();
}

function quickCmd(prefix) {
  const inp = document.getElementById('welcomeInput');
  inp.value = prefix + ' ';
  inp.focus();
  updateSendBtn();
}

function onWelcomeInput(el) {
  autoResize(el);
  updateSendBtn();
  const v = el.value;
  if (v.startsWith('/') && !v.includes(' ')) {
    renderPalette(v);
  } else {
    closePalette();
  }
}

function onWelcomeKey(e) {
  if (paletteOpen) {
    const items = document.querySelectorAll('.command-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); activeSuggestion = Math.min(activeSuggestion + 1, items.length - 1); renderPalette(document.getElementById('welcomeInput').value); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); activeSuggestion = Math.max(activeSuggestion - 1, 0); renderPalette(document.getElementById('welcomeInput').value); }
    else if (e.key === 'Tab' || e.key === 'Enter') {
      e.preventDefault();
      const active = document.querySelector('.command-item.active') || document.querySelector('.command-item');
      if (active) {
        const prefix = active.querySelector('.command-item-prefix').textContent;
        selectCommand(prefix);
      }
    }
    else if (e.key === 'Escape') { e.preventDefault(); closePalette(); }
    return;
  }
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    welcomeSend();
  }
}

function updateSendBtn() {
  const btn = document.getElementById('welcomeSendBtn');
  const val = document.getElementById('welcomeInput').value.trim();
  if (val) { btn.className = 'send-btn active'; btn.disabled = false; }
  else { btn.className = 'send-btn inactive'; btn.disabled = true; }
}

// Attachments
let attachments = [];
function attachFile() {
  const name = `file-${Math.floor(Math.random()*1000)}.pdf`;
  attachments.push(name);
  renderAttachments();
}
function removeAttachment(i) {
  attachments.splice(i, 1);
  renderAttachments();
}
function renderAttachments() {
  const el = document.getElementById('attachmentsList');
  el.innerHTML = attachments.map((f, i) => `
    <div class="attachment-chip">
      <span>${f}</span>
      <button class="attachment-remove" onclick="removeAttachment(${i})">✕</button>
    </div>`).join('');
}

// ── API & Chat ────────────────────────────────────────────
const API_URL = 'https://api.anthropic.com/v1/messages';
const SYSTEM = `You are VLAD IA, an advanced AI assistant. You are intelligent, precise and helpful. Reply in fluent English. You represent the VLAD digital AI project. Be concise yet comprehensive.`;

let messages = [];
let isLoading = false;

function welcomeSend() {
  const val = document.getElementById('welcomeInput').value.trim();
  if (!val || isLoading) return;
  startChat(val);
}

function startChat(text) {
  // Hide welcome, show chat mode
  const ws = document.getElementById('welcomeScreen');
  if (ws) { if (window._stopGlobe) window._stopGlobe(); ws.remove(); }
  document.getElementById('chatInput').style.display = 'block';

  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  callAPI();

  setTimeout(() => document.getElementById('chatTextarea').focus(), 100);
}

function addMessage(role, text) {
  const area = document.getElementById('messagesArea');
  const row = document.createElement('div');
  row.className = 'message-row';

  const meta = document.createElement('div');
  meta.className = 'message-meta';
  const av = document.createElement('div');
  av.className = `avatar ${role === 'assistant' ? 'ai' : 'user'}`;
  if (role === 'assistant') {
    av.style.cssText += 'background:#000;border:1px solid #333;padding:0;overflow:hidden;';
    av.innerHTML = '<img src="/mnt/user-data/uploads/1001353013.png" style="width:100%;height:100%;object-fit:cover;">';
  } else {
    av.textContent = 'You';
  }
  const nm = document.createElement('span');
  nm.className = 'sender-name';
  nm.textContent = role === 'assistant' ? 'VLAD IA' : 'You';
  meta.appendChild(av); meta.appendChild(nm);

  const body = document.createElement('div');
  body.className = `message-body${role === 'user' ? ' user-msg' : ''}`;
  body.innerHTML = formatText(text);

  row.appendChild(meta); row.appendChild(body);
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
  return body;
}

function formatText(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/`(.*?)`/g,'<code style="background:rgba(255,255,255,0.08);padding:2px 6px;border-radius:4px;font-size:13px">$1</code>')
    .replace(/\n/g,'<br>');
}

async function callAPI() {
  isLoading = true;
  document.getElementById('chatSendBtn').disabled = true;
  document.getElementById('thinkingBar').style.display = 'flex';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, system: SYSTEM, messages })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Sorry, something went wrong.';
    addMessage('assistant', reply);
    messages.push({ role: 'assistant', content: reply });

    if (messages.length === 2) {
      const hist = document.querySelector('.chat-history');
      const item = document.createElement('div');
      item.className = 'history-item active';
      item.textContent = messages[0].content.slice(0, 36) + (messages[0].content.length > 36 ? '…' : '');
      hist.innerHTML = '<div class="history-label">Today</div>';
      hist.appendChild(item);
    }
  } catch {
    addMessage('assistant', 'Connection failed. Please check your internet and try again.');
  }

  isLoading = false;
  document.getElementById('thinkingBar').style.display = 'none';
  document.getElementById('chatSendBtn').disabled = false;
  document.getElementById('chatTextarea').focus();
}

function sendMessage() {
  if (isLoading) return;
  const ta = document.getElementById('chatTextarea');
  const text = ta.value.trim();
  if (!text) return;
  ta.value = ''; ta.style.height = 'auto';
  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  callAPI();
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function newChat() { location.reload(); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

// Close palette on outside click
document.addEventListener('mousedown', (e) => {
  if (paletteOpen && !document.getElementById('commandPalette').contains(e.target) && e.target.id !== 'commandBtn') {
    closePalette();
  }
});
</script>
</body>
</html>
